<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MSX MV2 Web Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="player-area">
      <div class="canvas-wrapper">
        <canvas id="canvas"></canvas>
      </div>
      <div id="loading">Loading...</div>
      <div id="title">MV2 Player</div>
      <div id="controls">
        <button id="play" class="icon-btn" aria-label="Play/Pause">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 4l15 8-15 8V4z" fill="currentColor"/></svg>
          <span id="play-text" style="display:none; margin-left:4px; font-weight:600;">⏸</span>
        </button>
        <input id="seek" type="range" min="0" max="100" value="0">
        <span id="time">0:00/ 0:00</span>
        <label>🔊 <input id="volume" type="range" min="0" max="1" step="0.01" value="1"></label>
        <label for="speedSelect">Speed</label>
        <select id="speedSelect">
          <option value="0.5">0.5x</option>
          <option value="1.0" selected>1.0x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2.0">2.0x</option>
        </select>
        <label style="display:flex;align-items:center;gap:6px">Scanlines <input id="scanlinesToggle" type="checkbox" checked style="transform:scale(0.9);margin-left:6px"></label>
        <input id="fileinput" type="file" accept=".zip, .mv2, application/zip, application/x-zip-compressed" style="display:none" />
      </div>
      <button id="fullscreen" aria-label="Toggle fullscreen">⤢</button>
      <button id="fsExit" class="fs-exit" style="display:none;" aria-label="Exit fullscreen">✕</button>
    </div>
    <div id="dropzone">Drop .mv2 or .zip here</div>
  </div>
  <script>
    // Development-friendly cache-busting loader:
    // - If URL contains ?cachebust=VALUE that value is used (useful for reproducible tests)
    // - Otherwise a timestamp is used to force fresh fetches while developing
    (function(){
      try {
        const params = new URLSearchParams(location.search);
        const vb = params.get('cachebust') || Date.now();
        const head = document.getElementsByTagName('head')[0] || document.documentElement;
        const s1 = document.createElement('script'); s1.src = 'mv2player.js?v=' + vb; s1.defer = false; head.appendChild(s1);
        const s2 = document.createElement('script'); s2.src = 'app.js?v=' + vb; s2.defer = false; head.appendChild(s2);
      } catch(e) { console.error('cache-bust loader failed', e); }
    })();
  </script>
</body>
</html>
